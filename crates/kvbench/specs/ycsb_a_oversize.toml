# YCSB-A: 50% read / 50% update, uniform, dataset exceeds buffer pool.
# 50k records × ~108 bytes = ~5.4 MB dataset, 4096 frames × 4K = 16 MB budget.
# Dataset fits comfortably — warm mixed read/write workload measuring
# insert, update, and split throughput with minimal eviction.
workload = "ycsb_a"
distribution = { kind = "uniform" }
record_count = 50000
value_size = 100
operation_count = 200000
seed = 42
threads = 4

[engine_opts]
value_size = 100
sync_mode = "relaxed"
buffer_budget_frames = 4096
