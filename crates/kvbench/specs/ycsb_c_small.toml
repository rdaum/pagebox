# YCSB-C: 100% read, uniform, fits in buffer pool (10k records, 1024 frames).
workload = "ycsb_c"
distribution = { kind = "uniform" }
record_count = 10000
value_size = 100
operation_count = 100000
seed = 42
threads = 4

[engine_opts]
value_size = 100
sync_mode = "relaxed"
buffer_budget_frames = 1024
