# YCSB-A: 50% read / 50% update, uniform, dataset exceeds buffer pool.
# 200k records × ~108 bytes = ~21 MB dataset, 64 frames × 64K = 4 MB budget.
# Forces real eviction in kvstore's buffer pool and memory pressure in all
# engines with bounded caches. LMDB uses the unbounded OS page cache, so
# this spec highlights the architectural difference.
workload = "ycsb_a"
distribution = { kind = "uniform" }
record_count = 200000
value_size = 100
operation_count = 200000
seed = 42
threads = 4

[engine_opts]
value_size = 100
sync_mode = "relaxed"
buffer_budget_frames = 64
