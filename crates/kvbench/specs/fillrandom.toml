# FillRandom: random-order bulk load, write-heavy.
# 50k records × ~108 bytes = ~5.4 MB dataset, 4096 frames × 4K = 16 MB budget.
# Dataset fits — measures pure write throughput and split efficiency.
workload = "fill_random"
distribution = { kind = "uniform" }
record_count = 50000
value_size = 100
operation_count = 50000
seed = 42
threads = 4

[engine_opts]
value_size = 100
sync_mode = "relaxed"
buffer_budget_frames = 4096
