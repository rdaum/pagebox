# Overwrite: in-place update churn, no growth.
# The 64 MiB application-cache budget comfortably contains the data set.
workload = "overwrite"
distribution = { kind = "uniform" }
record_count = 50000
value_size = 100
operation_count = 200000
minimum_duration_secs = 3
seed = 42
threads = 4

[comparison]
id = "resident-overwrite"
engines = ["kvstore", "fjall", "redb", "rocksdb", "lmdb"]
memory_regime = "resident"
operation_contract = "visible_point_mutation"

[engine_opts]
sync_mode = "relaxed"
cache_budget_bytes = 67108864
