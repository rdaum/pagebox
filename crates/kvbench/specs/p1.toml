# Phase 1 spec: YCSB-A workload against kvstore with zipfian distribution.
workload = "ycsb_a"
distribution = { kind = "zipfian", params = { theta = 0.99 } }
record_count = 50000
value_size = 100
operation_count = 100000
minimum_duration_secs = 3
seed = 42
threads = 4

[comparison]
id = "p1-kvstore-resident-mixed"
engines = ["kvstore"]
memory_regime = "resident"
operation_contract = "visible_point_mutation"

[engine_opts]
sync_mode = "relaxed"
cache_budget_bytes = 67108864
