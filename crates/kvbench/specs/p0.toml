# Phase 0 spec: single-threaded ReadRandom against kvstore.
workload = "read_random"
distribution = { kind = "uniform" }
record_count = 10000
value_size = 100
operation_count = 50000
minimum_duration_secs = 2
seed = 42
threads = 1

[comparison]
id = "p0-kvstore-resident-read"
engines = ["kvstore"]
memory_regime = "resident"
operation_contract = "point_read"

[engine_opts]
sync_mode = "relaxed"
cache_budget_bytes = 67108864
