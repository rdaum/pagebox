# YCSB-C: 100% read, uniform, exceeds buffer pool (50k records, 1024 frames).
workload = "ycsb_c"
distribution = { kind = "uniform" }
record_count = 50000
value_size = 100
operation_count = 200000
seed = 42
threads = 4

[engine_opts]
value_size = 100
sync_mode = "relaxed"
buffer_budget_frames = 1024
