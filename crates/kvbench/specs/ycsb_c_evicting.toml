# YCSB-C: 100% read, uniform, dataset exceeds buffer pool.
# 200k records × ~108 bytes = ~21 MB dataset, 8192 frames × 4K = 32 MB budget.
# Dataset partially fits — realistic memory pressure where the working set
# has hot and cold regions. Tests cache eviction and re-fetch paths across
# all engines with a fair cache budget.
workload = "ycsb_c"
distribution = { kind = "uniform" }
record_count = 200000
value_size = 100
operation_count = 200000
seed = 42
threads = 4

[engine_opts]
value_size = 100
sync_mode = "relaxed"
buffer_budget_frames = 8192
