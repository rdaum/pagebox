# YCSB-C: 100% read, uniform, dataset exceeds buffer pool.
# 200k records × ~108 bytes = ~21 MB dataset, 64 frames × 64K = 4 MB budget.
# Pure-read workload under memory pressure: exercises cache eviction and
# re-fetch paths. The key comparison is kvstore's swizzled-pointer buffer
# pool (controlled residency, second-chance eviction) vs LMDB's OS page cache
# (unbounded, kernel-managed) vs LSM block caches (bounded, LRU).
workload = "ycsb_c"
distribution = { kind = "uniform" }
record_count = 200000
value_size = 100
operation_count = 200000
seed = 42
threads = 4

[engine_opts]
value_size = 100
sync_mode = "relaxed"
buffer_budget_frames = 64
