# Resident YCSB-A: 50% uniform point reads and 50% point updates over 50k
# records. The 64 MiB application-cache budget comfortably contains the data
# set. Every update is visible when its measured call returns.
workload = "ycsb_a"
distribution = { kind = "uniform" }
record_count = 50000
value_size = 100
operation_count = 200000
minimum_duration_secs = 3
seed = 42
threads = 4

[comparison]
id = "resident-ycsb-a"
engines = ["kvstore", "fjall", "redb", "rocksdb", "lmdb"]
memory_regime = "resident"
operation_contract = "visible_point_mutation"

[engine_opts]
sync_mode = "relaxed"
cache_budget_bytes = 67108864
